<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#dfe5ec;
    font-family:Arial,sans-serif;
    padding:30px;
}

.resume{
    width:210mm;
    min-height:297mm;
    background:white;
    margin:auto;
    display:grid;
    grid-template-columns:260px 1fr;
    overflow:hidden;
    box-shadow:0 15px 50px rgba(0,0,0,0.1);
}

.left{
    background:#111827;
    color:white;
    padding:25px;
}

.photo{
    width:130px;
    height:130px;
    border-radius:20px;
    overflow:hidden;
    background:#1f2937;
    margin:auto;
    margin-bottom:18px;
    cursor:pointer;
    position:relative;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.photo::after{
    content:"Фото";
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.45);
    opacity:0;
    transition:0.2s;
    font-size:13px;
}

.photo:hover::after{
    opacity:1;
}

.name{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:24px;
    font-weight:800;
    text-align:center;
    line-height:1.2;
    margin-bottom:8px;
}

.position{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:#93c5fd;
    text-align:center;
    font-size:14px;
    margin-bottom:25px;
}

.block{
    margin-bottom:20px;
}

.title{
    font-size:12px;
    text-transform:uppercase;
    font-weight:800;
    color:#93c5fd;
    margin-bottom:8px;
    border-bottom:1px solid rgba(255,255,255,0.15);
    padding-bottom:5px;
    letter-spacing:1px;
}

.left textarea,
.left input{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    resize:none;
    font-size:11px;
    line-height:1.6;
}

.right{
    padding:30px;
}

.section{
    margin-bottom:22px;
}

.section-title{
    font-size:15px;
    font-weight:800;
    color:#111827;
    border-bottom:2px solid #e5e7eb;
    padding-bottom:6px;
    margin-bottom:10px;
    text-transform:uppercase;
}

.right textarea{
    width:100%;
    border:none;
    outline:none;
    resize:none;
    font-size:11px;
    line-height:1.6;
    color:#1f2937;
}

.languages{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.lang input{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:11px;
    margin-bottom:4px;
}

.bar{
    width:100%;
    height:5px;
    background:#374151;
    border-radius:20px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:#60a5fa;
}

.controls{
    width:210mm;
    margin:auto;
    margin-top:15px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.add{
    background:#111827;
    color:white;
}

.pdf{
    background:#2563eb;
    color:white;
}

@media print{

    body{
        background:white;
        padding:0;
    }

    .controls{
        display:none;
    }

    .resume{
        box-shadow:none;
    }

}

</style>
</head>
<body>

<div class="resume" id="resume">

    <div class="left">

        <label class="photo">
            <img id="photoPreview">
            <input type="file"
                   id="photoInput"
                   accept="image/*"
                   hidden>
        </label>

        <input class="name"
               placeholder="ФИО">

        <input class="position"
               placeholder="Должность">

        <div class="block">

            <div class="title">
                Контакты
            </div>

            <textarea rows="6"
placeholder="Дата рождения
Адрес
Телефон
Email"></textarea>

        </div>

        <div class="block">

            <div class="title">
                Навыки
            </div>

            <textarea rows="7"
placeholder="HTML
CSS
JavaScript
Photoshop"></textarea>

        </div>

        <div class="block">

            <div class="title">
                Языки
            </div>

            <div class="languages" id="languages">

                <div class="lang">

                    <input placeholder="Русский — 100">

                    <div class="bar">
                        <div class="fill"
style="width:100%"></div>
                    </div>

                </div>

            </div>

        </div>

        <div class="block">

            <div class="title">
                Качества
            </div>

            <textarea rows="5"
placeholder="Ответственность
Коммуникабельность"></textarea>

        </div>

    </div>

    <div class="right">

        <div class="section">

            <div class="section-title">
                Опыт работы
            </div>

            <textarea rows="18"
placeholder="2020 — 2025
Компания
Должность

Обязанности..."></textarea>

        </div>

        <div class="section">

            <div class="section-title">
                Образование
            </div>

            <textarea rows="7"
placeholder="2015 — 2020
Университет
Специальность"></textarea>

        </div>

        <div class="section">

            <div class="section-title">
                Дополнительное образование
            </div>

            <textarea rows="5"
placeholder="Курсы
Сертификаты"></textarea>

        </div>

    </div>

</div>

<div class="controls">

    <button class="add"
onclick="addLanguage()">
        + Язык
    </button>

    <button class="pdf"
onclick="downloadPDF()">
        Скачать PDF
    </button>

</div>

<script>

document.getElementById('photoInput')
.addEventListener('change', function(e){

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(event){

            document.getElementById('photoPreview')
            .src = event.target.result;

        }

        reader.readAsDataURL(file);

    }

});

function addLanguage(){

    const container =
        document.getElementById('languages');

    const div =
        document.createElement('div');

    div.className = 'lang';

    div.innerHTML = `

        <input placeholder="Английский — 70"
        oninput="updateBar(this)">

        <div class="bar">
            <div class="fill"
            style="width:70%"></div>
        </div>

    `;

    container.appendChild(div);

}

function updateBar(input){

    const value =
        parseInt(input.value.match(/\d+/));

    if(!isNaN(value)){

        input.parentElement
        .querySelector('.fill')
        .style.width = value + '%';

    }

}

document.querySelectorAll('.lang input')
.forEach(input => {

    input.addEventListener('input',
    function(){

        updateBar(this);

    });

});

function downloadPDF(){

    const element =
        document.getElementById('resume');

    const options = {

        margin:0,

        filename:'resume.pdf',

        image:{
            type:'jpeg',
            quality:1
        },

        html2canvas:{
            scale:2
        },

        jsPDF:{
            unit:'mm',
            format:'a4',
            orientation:'portrait'
        }

    };

    html2pdf()
        .set(options)
        .from(element)
        .save();

}

</script>

</body>
</html>
