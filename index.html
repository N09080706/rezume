<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e9edf2;
    font-family:Arial, sans-serif;
    padding:20px;
    color:#222;
}

.container{
    max-width:1400px;
    margin:auto;
    display:flex;
    gap:20px;
    align-items:flex-start;
}

.panel{
    width:360px;
    background:white;
    padding:20px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    position:sticky;
    top:20px;
}

.panel h2{
    margin-bottom:20px;
    font-size:24px;
}

.panel label{
    font-size:13px;
    font-weight:bold;
    display:block;
    margin-bottom:5px;
    margin-top:14px;
}

.panel input,
.panel textarea{
    width:100%;
    border:1px solid #d8dce3;
    border-radius:8px;
    padding:10px;
    font-size:14px;
    resize:vertical;
    outline:none;
}

.panel textarea{
    min-height:80px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    border:none;
    padding:13px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
    transition:0.2s;
}

.generate{
    background:#0f172a;
    color:white;
}

.pdf{
    background:#2563eb;
    color:white;
}

button:hover{
    transform:translateY(-2px);
}

.resume-wrapper{
    flex:1;
    display:flex;
    justify-content:center;
}

.resume{
    width:210mm;
    min-height:297mm;
    background:white;
    padding:28px;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
    overflow:hidden;
}

.top{
    display:flex;
    justify-content:space-between;
    gap:20px;
    border-bottom:3px solid #0f172a;
    padding-bottom:18px;
    margin-bottom:20px;
}

.left-top{
    flex:1;
}

.name{
    font-size:34px;
    font-weight:800;
    line-height:1.1;
    color:#0f172a;
    margin-bottom:10px;
}

.position{
    font-size:18px;
    color:#2563eb;
    font-weight:bold;
}

.contacts{
    text-align:right;
    font-size:14px;
    line-height:1.8;
}

.section{
    margin-bottom:18px;
}

.section-title{
    font-size:16px;
    font-weight:800;
    color:#0f172a;
    margin-bottom:10px;
    text-transform:uppercase;
    border-left:5px solid #2563eb;
    padding-left:10px;
}

.content{
    font-size:14px;
    line-height:1.5;
    white-space:pre-line;
}

.two-col{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.skills-box{
    background:#f4f7fb;
    padding:12px;
    border-radius:10px;
}

@media print{

    body{
        background:white;
        padding:0;
    }

    .panel{
        display:none;
    }

    .resume{
        box-shadow:none;
        margin:0;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="panel">

        <h2>Создание резюме</h2>

        <label>ФИО</label>
        <input type="text" id="fullname" placeholder="Введите ФИО">

        <label>Желаемая должность</label>
        <input type="text" id="position" placeholder="Например: Frontend Developer">

        <label>Дата рождения</label>
        <input type="text" id="birth" placeholder="15.04.2000">

        <label>Адрес</label>
        <input type="text" id="address" placeholder="г. Душанбе">

        <label>Телефон</label>
        <input type="text" id="phone" placeholder="+992 00 000 00 00">

        <label>Email</label>
        <input type="text" id="email" placeholder="mail@mail.com">

        <label>Опыт работы</label>
        <textarea id="experience" placeholder="Введите опыт работы"></textarea>

        <label>Образование</label>
        <textarea id="education" placeholder="Введите образование"></textarea>

        <label>Дополнительное образование</label>
        <textarea id="extraedu" placeholder="Введите дополнительные курсы"></textarea>

        <label>Навыки</label>
        <textarea id="skills" placeholder="Введите навыки"></textarea>

        <label>Личные качества</label>
        <textarea id="qualities" placeholder="Введите качества"></textarea>

        <div class="buttons">
            <button class="generate" onclick="generateResume()">
                Обновить
            </button>

            <button class="pdf" onclick="downloadPDF()">
                PDF
            </button>
        </div>

    </div>

    <div class="resume-wrapper">

        <div class="resume" id="resume">

            <div class="top">

                <div class="left-top">
                    <div class="name" id="r_name"></div>
                    <div class="position" id="r_position"></div>
                </div>

                <div class="contacts">
                    <div id="r_birth"></div>
                    <div id="r_address"></div>
                    <div id="r_phone"></div>
                    <div id="r_email"></div>
                </div>

            </div>

            <div class="section">
                <div class="section-title">Опыт работы</div>
                <div class="content" id="r_experience"></div>
            </div>

            <div class="two-col">

                <div>

                    <div class="section">
                        <div class="section-title">Образование</div>
                        <div class="content" id="r_education"></div>
                    </div>

                    <div class="section">
                        <div class="section-title">Доп. образование</div>
                        <div class="content" id="r_extraedu"></div>
                    </div>

                </div>

                <div>

                    <div class="section">
                        <div class="section-title">Навыки</div>

                        <div class="skills-box">
                            <div class="content" id="r_skills"></div>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Личные качества</div>

                        <div class="skills-box">
                            <div class="content" id="r_qualities"></div>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function generateResume(){

    document.getElementById('r_name').innerText =
        document.getElementById('fullname').value;

    document.getElementById('r_position').innerText =
        document.getElementById('position').value;

    document.getElementById('r_birth').innerText =
        "Дата рождения: " + document.getElementById('birth').value;

    document.getElementById('r_address').innerText =
        "Адрес: " + document.getElementById('address').value;

    document.getElementById('r_phone').innerText =
        "Телефон: " + document.getElementById('phone').value;

    document.getElementById('r_email').innerText =
        "Email: " + document.getElementById('email').value;

    document.getElementById('r_experience').innerText =
        document.getElementById('experience').value;

    document.getElementById('r_education').innerText =
        document.getElementById('education').value;

    document.getElementById('r_extraedu').innerText =
        document.getElementById('extraedu').value;

    document.getElementById('r_skills').innerText =
        document.getElementById('skills').value;

    document.getElementById('r_qualities').innerText =
        document.getElementById('qualities').value;
}

function downloadPDF(){

    const element = document.getElementById("resume");

    const options = {
        margin:0,
        filename:'resume.pdf',
        image:{ type:'jpeg', quality:1 },
        html2canvas:{
            scale:2
        },
        jsPDF:{
            unit:'mm',
            format:'a4',
            orientation:'portrait'
        }
    };

    html2pdf().set(options).from(element).save();
}

</script>

</body>
</html>
