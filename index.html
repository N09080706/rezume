<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e9edf2;
    font-family:Arial, sans-serif;
    padding:20px;
    color:#222;
}

.container{
    max-width:1400px;
    margin:auto;
    display:flex;
    gap:20px;
    align-items:flex-start;
}

.panel{
    width:360px;
    background:white;
    padding:20px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    position:sticky;
    top:20px;
    max-height:95vh;
    overflow:auto;
}

.panel h2{
    margin-bottom:20px;
    font-size:24px;
}

.panel label{
    font-size:13px;
    font-weight:bold;
    display:block;
    margin-bottom:5px;
    margin-top:14px;
}

.panel input,
.panel textarea{
    width:100%;
    border:1px solid #d8dce3;
    border-radius:8px;
    padding:10px;
    font-size:14px;
    outline:none;
}

.panel textarea{
    resize:vertical;
    min-height:80px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    border:none;
    padding:13px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
}

.generate{
    background:#0f172a;
    color:white;
}

.pdf{
    background:#2563eb;
    color:white;
}

.resume-wrapper{
    flex:1;
    display:flex;
    justify-content:center;
}

.resume{
    width:210mm;
    min-height:297mm;
    background:white;
    padding:28px;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
    overflow:hidden;
}

.top{
    display:flex;
    justify-content:space-between;
    gap:20px;
    border-bottom:3px solid #0f172a;
    padding-bottom:18px;
    margin-bottom:20px;
}

.left-top{
    display:flex;
    gap:20px;
    align-items:center;
    flex:1;
}

.photo{
    width:120px;
    height:120px;
    border-radius:14px;
    overflow:hidden;
    background:#e5e7eb;
    flex-shrink:0;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.name{
    font-size:32px;
    font-weight:800;
    line-height:1.1;
    color:#0f172a;
    margin-bottom:10px;
}

.position{
    font-size:18px;
    color:#2563eb;
    font-weight:bold;
}

.contacts{
    text-align:right;
    font-size:14px;
    line-height:1.8;
}

.section{
    margin-bottom:18px;
}

.section-title{
    font-size:16px;
    font-weight:800;
    color:#0f172a;
    margin-bottom:10px;
    text-transform:uppercase;
    border-left:5px solid #2563eb;
    padding-left:10px;
}

.content{
    font-size:14px;
    line-height:1.5;
    white-space:pre-line;
}

.two-col{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.skills-box{
    background:#f4f7fb;
    padding:12px;
    border-radius:10px;
}

.language-item{
    margin-bottom:10px;
}

.language-name{
    font-size:13px;
    margin-bottom:4px;
}

.language-bar{
    width:100%;
    height:7px;
    background:#dbe2ea;
    border-radius:20px;
    overflow:hidden;
}

.language-fill{
    height:100%;
    background:#60a5fa;
}

@media print{

    body{
        background:white;
        padding:0;
    }

    .panel{
        display:none;
    }

    .resume{
        box-shadow:none;
        margin:0;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="panel">

        <h2>Создание резюме</h2>

        <label>Фото</label>
        <input type="file" id="photoInput" accept="image/*">

        <label>ФИО</label>
        <input type="text" id="fullname">

        <label>Желаемая должность</label>
        <input type="text" id="position">

        <label>Дата рождения</label>
        <input type="text" id="birth">

        <label>Адрес</label>
        <input type="text" id="address">

        <label>Телефон</label>
        <input type="text" id="phone">

        <label>Email</label>
        <input type="text" id="email">

        <label>Опыт работы</label>
        <textarea id="experience"></textarea>

        <label>Образование</label>
        <textarea id="education"></textarea>

        <label>Дополнительное образование</label>
        <textarea id="extraedu"></textarea>

        <label>Навыки</label>
        <textarea id="skills"></textarea>

        <label>Языки</label>
        <textarea id="languages"
placeholder="Русский — 100%
Английский — 70%
Таджикский — 95%"></textarea>

        <label>Личные качества</label>
        <textarea id="qualities"></textarea>

        <div class="buttons">

            <button class="generate"
onclick="generateResume()">
                Обновить
            </button>

            <button class="pdf"
onclick="downloadPDF()">
                PDF
            </button>

        </div>

    </div>

    <div class="resume-wrapper">

        <div class="resume" id="resume">

            <div class="top">

                <div class="left-top">

                    <div class="photo">
                        <img id="previewPhoto">
                    </div>

                    <div>

                        <div class="name"
id="r_name"></div>

                        <div class="position"
id="r_position"></div>

                    </div>

                </div>

                <div class="contacts">

                    <div id="r_birth"></div>

                    <div id="r_address"></div>

                    <div id="r_phone"></div>

                    <div id="r_email"></div>

                </div>

            </div>

            <div class="section">

                <div class="section-title">
                    Опыт работы
                </div>

                <div class="content"
id="r_experience"></div>

            </div>

            <div class="two-col">

                <div>

                    <div class="section">

                        <div class="section-title">
                            Образование
                        </div>

                        <div class="content"
id="r_education"></div>

                    </div>

                    <div class="section">

                        <div class="section-title">
                            Доп. образование
                        </div>

                        <div class="content"
id="r_extraedu"></div>

                    </div>

                </div>

                <div>

                    <div class="section">

                        <div class="section-title">
                            Навыки
                        </div>

                        <div class="skills-box">

                            <div class="content"
id="r_skills"></div>

                        </div>

                    </div>

                    <div class="section">

                        <div class="section-title">
                            Языки
                        </div>

                        <div class="skills-box"
id="languageContainer"></div>

                    </div>

                    <div class="section">

                        <div class="section-title">
                            Личные качества
                        </div>

                        <div class="skills-box">

                            <div class="content"
id="r_qualities"></div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

document.getElementById('photoInput')
.addEventListener('change', function(e){

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(event){

            document.getElementById('previewPhoto')
            .src = event.target.result;

        }

        reader.readAsDataURL(file);

    }

});

function generateResume(){

    document.getElementById('r_name').innerText =
        document.getElementById('fullname').value;

    document.getElementById('r_position').innerText =
        document.getElementById('position').value;

    document.getElementById('r_birth').innerText =
        "Дата рождения: " +
        document.getElementById('birth').value;

    document.getElementById('r_address').innerText =
        "Адрес: " +
        document.getElementById('address').value;

    document.getElementById('r_phone').innerText =
        "Телефон: " +
        document.getElementById('phone').value;

    document.getElementById('r_email').innerText =
        "Email: " +
        document.getElementById('email').value;

    document.getElementById('r_experience').innerText =
        document.getElementById('experience').value;

    document.getElementById('r_education').innerText =
        document.getElementById('education').value;

    document.getElementById('r_extraedu').innerText =
        document.getElementById('extraedu').value;

    document.getElementById('r_skills').innerText =
        document.getElementById('skills').value;

    document.getElementById('r_qualities').innerText =
        document.getElementById('qualities').value;

    generateLanguages();
}

function generateLanguages(){

    const container =
        document.getElementById('languageContainer');

    container.innerHTML = '';

    const lines =
        document.getElementById('languages')
        .value
        .split('\n');

    lines.forEach(line => {

        if(line.trim() !== ''){

            const parts = line.split('—');

            if(parts.length >= 2){

                const lang =
                    parts[0].trim();

                const percent =
                    parseInt(parts[1]);

                const block =
                    document.createElement('div');

                block.className =
                    'language-item';

                block.innerHTML = `

                    <div class="language-name">
                        ${lang}
                    </div>

                    <div class="language-bar">
                        <div class="language-fill"
                        style="width:${percent}%">
                        </div>
                    </div>

                `;

                container.appendChild(block);

            }

        }

    });

}

function downloadPDF(){

    const element =
        document.getElementById('resume');

    const options = {

        margin:0,

        filename:'resume.pdf',

        image:{
            type:'jpeg',
            quality:1
        },

        html2canvas:{
            scale:2
        },

        jsPDF:{
            unit:'mm',
            format:'a4',
            orientation:'portrait'
        }

    };

    html2pdf()
        .set(options)
        .from(element)
        .save();

}

</script>

</body>
</html>
